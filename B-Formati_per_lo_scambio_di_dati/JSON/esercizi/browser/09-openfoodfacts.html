<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 09 - Open Food Facts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }

        .info strong {
            color: #333;
        }

        #loading {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #results {
            display: grid;
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 20px;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 150px;
            height: 150px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .product-image.placeholder {
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 48px;
        }

        .product-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.4em;
        }

        .product-info p {
            color: #666;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .nutrition-score {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            font-size: 14px;
            margin-top: 10px;
        }

        .score-a { background: #008000; }
        .score-b { background: #85bb2f; }
        .score-c { background: #fecb02; }
        .score-d { background: #ee8100; }
        .score-e { background: #e63e11; }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .tag {
            background: #e0e0e0;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #555;
        }

        .json-data {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Open Food Facts API</h1>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Cerca prodotto (es: Nutella, Coca Cola, Pizza...)" />
                <button id="searchBtn" onclick="searchProducts()">🔍 Cerca</button>
            </div>
            <div class="info">
                <strong>Open Food Facts</strong> è un database collaborativo di prodotti alimentari con informazioni 
                nutrizionali, ingredienti, allergeni e molto altro. API completamente gratuita e open source!
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p>Caricamento dati...</p>
        </div>

        <div id="error" class="error"></div>

        <div id="results"></div>
    </div>

    <script>
        /**
         * Esercizio 09 - Open Food Facts API
         * 
         * Obiettivi:
         * - Chiamare API Open Food Facts
         * - Parsing dati nutrizionali JSON
         * - Visualizzazione informazioni prodotto
         */

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');

        // Listener per Enter key
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchProducts();
            }
        });

        /**
         * Funzione per cercare prodotti
         */
        async function searchProducts() {
            const query = searchInput.value.trim();
            
            if (!query) {
                showError('Inserisci un termine di ricerca');
                return;
            }

            // Nascondi errori e mostra loading
            error.style.display = 'none';
            loading.style.display = 'block';
            searchBtn.disabled = true;

            try {
                // Chiamata API Open Food Facts
                const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=10`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                console.log('Dati JSON ricevuti:', data);
                
                // Cancella risultati vecchi e visualizza nuovi risultati
                results.innerHTML = '';
                displayResults(data.products);
                
            } catch (err) {
                console.error('Errore:', err);
                showError('Errore durante la ricerca: ' + err.message);
            } finally {
                loading.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        /**
         * Funzione per visualizzare i risultati
         */
        function displayResults(products) {
            if (!products || products.length === 0) {
                showError('Nessun prodotto trovato');
                return;
            }

            // Nascondi eventuali errori precedenti
            error.style.display = 'none';

            products.forEach(product => {
                const card = createProductCard(product);
                results.appendChild(card);
            });
        }

        /**
         * Crea card per un prodotto
         */
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';

            // Immagine prodotto
            const imageDiv = document.createElement('div');
            if (product.image_url) {
                const img = document.createElement('img');
                img.src = product.image_url;
                img.alt = product.product_name || 'Prodotto';
                img.className = 'product-image';
                imageDiv.appendChild(img);
            } else {
                imageDiv.className = 'product-image placeholder';
                imageDiv.textContent = '📦';
            }

            // Informazioni prodotto
            const infoDiv = document.createElement('div');
            infoDiv.className = 'product-info';

            // Nome
            const title = document.createElement('h3');
            title.textContent = product.product_name || 'Nome non disponibile';
            infoDiv.appendChild(title);

            // Brand
            if (product.brands) {
                const brand = document.createElement('p');
                brand.innerHTML = `<strong>Marca:</strong> ${product.brands}`;
                infoDiv.appendChild(brand);
            }

            // Quantità
            if (product.quantity) {
                const quantity = document.createElement('p');
                quantity.innerHTML = `<strong>Quantità:</strong> ${product.quantity}`;
                infoDiv.appendChild(quantity);
            }

            // Nutriscore
            if (product.nutrition_grades) {
                const score = document.createElement('span');
                score.className = `nutrition-score score-${product.nutrition_grades.toLowerCase()}`;
                score.textContent = `Nutri-Score: ${product.nutrition_grades.toUpperCase()}`;
                infoDiv.appendChild(score);
            }

            // Informazioni nutrizionali
            if (product.nutriments) {
                const nutrition = document.createElement('p');
                nutrition.innerHTML = `<strong>Per 100g:</strong> ` +
                    `Energia: ${product.nutriments.energy_100g || 'N/A'} kJ, ` +
                    `Grassi: ${product.nutriments.fat_100g || 'N/A'}g, ` +
                    `Zuccheri: ${product.nutriments.sugars_100g || 'N/A'}g, ` +
                    `Proteine: ${product.nutriments.proteins_100g || 'N/A'}g`;
                infoDiv.appendChild(nutrition);
            }

            // Tags
            if (product.categories_tags && product.categories_tags.length > 0) {
                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'tags';
                product.categories_tags.slice(0, 5).forEach(tag => {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'tag';
                    tagSpan.textContent = tag.replace('en:', '');
                    tagsDiv.appendChild(tagSpan);
                });
                infoDiv.appendChild(tagsDiv);
            }

            // Pulsante per vedere JSON
            const jsonBtn = document.createElement('button');
            jsonBtn.textContent = '{ } Mostra JSON';
            jsonBtn.style.marginTop = '10px';
            jsonBtn.onclick = () => toggleJSON(product, infoDiv);
            infoDiv.appendChild(jsonBtn);

            card.appendChild(imageDiv);
            card.appendChild(infoDiv);

            return card;
        }

        /**
         * Toggle visualizzazione JSON
         */
        function toggleJSON(product, container) {
            const existingJson = container.querySelector('.json-data');
            
            if (existingJson) {
                existingJson.remove();
            } else {
                const jsonDiv = document.createElement('div');
                jsonDiv.className = 'json-data';
                jsonDiv.textContent = JSON.stringify(product, null, 2);
                container.appendChild(jsonDiv);
            }
        }

        /**
         * Mostra errore
         */
        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
            results.innerHTML = ''; // Cancella risultati solo in caso di errore
        }

        // Ricerca iniziale di esempio
        searchInput.value = 'Nutella';
    </script>

    -->
</body>
</html>
